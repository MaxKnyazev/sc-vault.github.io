name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/stalcraft-cors-proxy/package-lock.json

      - name: Deploy Cloudflare Worker (прокси eAPI, обход CORS)
        id: cf_worker
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: infra/stalcraft-cors-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          DEPLOY=(npx wrangler deploy)
          if [ -n "${{ vars.STALCRAFT_CORS_ORIGIN }}" ]; then
            DEPLOY+=(--var "ALLOWED_ORIGIN:${{ vars.STALCRAFT_CORS_ORIGIN }}")
          fi
          OUT=$("${DEPLOY[@]}" 2>&1) || { echo "$OUT"; exit 1; }
          echo "$OUT"
          URL=$(printf '%s' "$OUT" | node "${GITHUB_WORKSPACE}/scripts/ci/parse-workers-dev-url.mjs")
          echo "VITE_STALCRAFT_API_BASE_URL=$URL" >> "$GITHUB_ENV"
          echo "Сборка будет использовать прокси: $URL"

      - name: API base URL только из секрета (без деплоя воркера в CI)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' && secrets.VITE_STALCRAFT_API_BASE_URL != '' }}
        run: |
          echo "VITE_STALCRAFT_API_BASE_URL=${{ secrets.VITE_STALCRAFT_API_BASE_URL }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
