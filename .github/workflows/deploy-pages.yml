name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Нельзя использовать secrets в if: (ошибка валидатора). Проверка — в bash через env.
      - name: Деплой Cloudflare Worker и/или VITE_STALCRAFT_API_BASE_URL
        env:
          CI: true
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_STALCRAFT_API_BASE_URL_SECRET: ${{ secrets.VITE_STALCRAFT_API_BASE_URL }}
          STALCRAFT_CORS_ORIGIN: ${{ vars.STALCRAFT_CORS_ORIGIN }}
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            cd infra/stalcraft-cors-proxy
            npm ci
            DEPLOY=(npx wrangler deploy)
            if [ -n "${STALCRAFT_CORS_ORIGIN:-}" ]; then
              DEPLOY+=(--var "ALLOWED_ORIGIN:${STALCRAFT_CORS_ORIGIN}")
            fi
            OUT=$("${DEPLOY[@]}" 2>&1) || { echo "$OUT"; exit 1; }
            echo "$OUT"
            cd "${GITHUB_WORKSPACE}"
            URL=$(printf '%s' "$OUT" | node "${GITHUB_WORKSPACE}/scripts/ci/resolve-stalcraft-worker-url.mjs")
            echo "VITE_STALCRAFT_API_BASE_URL=$URL" >> "${GITHUB_ENV}"
            echo "Сборка будет использовать прокси: $URL"
          elif [ -n "${VITE_STALCRAFT_API_BASE_URL_SECRET:-}" ]; then
            echo "VITE_STALCRAFT_API_BASE_URL=${VITE_STALCRAFT_API_BASE_URL_SECRET}" >> "${GITHUB_ENV}"
          else
            echo "Прокси не настроен (нет CLOUDFLARE_API_TOKEN и VITE_STALCRAFT_API_BASE_URL) — сборка без URL прокси."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
